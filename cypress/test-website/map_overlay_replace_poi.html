<!DOCTYPE html>
<html>
    <head>
        <title>Test Website</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <script type="module">
            import 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
            import 'http://localhost:9876/Leaflet.GridLayer.VMS2/Leaflet.GridLayer.VMS2.js';
            import PrintFormat from 'http://localhost:9876/Leaflet.GridLayer.VMS2/PrintFormat.js';
            import MapOverlay, { PoiLayer } from 'http://localhost:9876/Leaflet.GridLayer.VMS2/MapOverlay.js';

            L.Map.addInitHook(function () {
                this.getContainer().leafletMap = this;
            });

            const map = L.map('map', {
                minZoom: 0,
                maxZoom: 19
            }).setView([52.27645, 10.53453], 15);

            const vms2Layer = L.gridLayer.vms2({
                attribution: '&copy; <a href="https://maps.locr.com">locr</a>/<a href="https://osm.org/copyright">OpenStreetMap</a>/<a href="https://leafletjs.com/">Leaflet</a>',
                style: '4502',
                disableDecode: true,
            });

            const printFormat = new PrintFormat({
                width: 14.8,
                height: 21,
                unitType: 'cm'
            });
            vms2Layer.setPrintFormat(printFormat);

            const mapOverlay = new MapOverlay(printFormat.getSize());
            const iconData = {
                iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png', 
                id: 'my-marker',
                latitude: 52.27645,
                longitude: 10.53453,
                iconSize: [25, 41],
                iconAnchor: [12.5, 41],
            }
            mapOverlay.add(new PoiLayer(iconData));
            vms2Layer.setMapOverlay(mapOverlay);

            vms2Layer.addTo(map);

            const replacePoiButton = document.getElementById('replace-poi');
            replacePoiButton.addEventListener('click', () => {
                const iconData = {
                    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png', 
                    id: 'my-marker',
                    iconSize: [50, 82],
                    iconAnchor: [25, 82],
                };
                mapOverlay.addOrReplace(new PoiLayer(iconData));
                vms2Layer.setMapOverlay(mapOverlay);
            });
        </script>
    </head>
    <body style="margin: 0; padding: 0;">
        <div id="map" style="border: 1px solid black; width: 500px; height: 500px; margin-left: auto; margin-right: auto;"></div>
        <div style="text-align: center; margin-top: 10px; margin-bottom: 10px;"><button id="replace-poi">replace POI</button></div>
    </body>
</html>
